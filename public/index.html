<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymStreak</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div class="bg-gradient"></div>

    <header class="site-header">
        <div class="header-conteiner">
            <nav class="main-nav" aria-label="Navegação principal">
                <a class="brand" href="#inicio" aria-label="GymStreak, ir para a página inicial">
                    <span class="brand-text">
                        <strong>GymStreak</strong>
                    </span>
                </a>
                <div class="mobile-menu">
                    <div class="line1"></div>
                    <div class="line2"></div>
                    <div class="line3"></div>
                </div>
                <ul class="nav-list">
                    <li><a href="#montar">Montar treino</a></li>
                    <li><a href="#volume">Volume ideal</a></li>
                    <li><a href="#carga">Anotar carga</a></li>
                </ul>
            </nav>

            <ul class="header-actions" aria-label="Ações do usuário">

                <li><a class="action-button" href="#amigos">Adicionar amigos</a></li>
            </ul>
        </div>

    <main>
        <div class="container-fluid h-100 d-flex align-items-center">
            <div class="row w-100">
                <div
                    class="col-lg-6 col-12 main-nav-left d-flex align-items-center justify-content-lg-end justify-content-center">

                        <button class="btn btn-primary mt-3">Sugerir treino</button>
                    </div>
                </div>
                <div class="col-lg-6 col-12 main-nav-right d-flex align-items-center justify-content-center">
                    <img src="img/main-img.png" alt="" class="img-fluid">
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
